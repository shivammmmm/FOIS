version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: fois-postgres
    environment:
      POSTGRES_USER: fois_user
      POSTGRES_PASSWORD: fois_password
      POSTGRES_DB: fois_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fois_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
